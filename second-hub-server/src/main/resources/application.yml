server:
  port: 8080

spring:
  application:
    name: second-hub-server
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 30MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/db_second_hub?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    druid:
      # 连接池名称
      pool-name: druid-pool
      # 初始连接数
      initial-size: 5
      # 最大连接数
      max-active: 20
      # 最小空闲连接
      min-idle: 5
      # 连接最大等待时间
      max-wait: 60000
      # 连接泄漏检测时间间隔
      time-between-eviction-runs-millis: 60000
      # 连接最小生存时间
      min-evictable-idle-time-millis: 300000
      # 验证连接是否可用
      validation-query: SELECT 1
      # 是否在获取连接时验证
      test-while-idle: true
      # 是否在归还连接时验证
      test-on-borrow: false
      # 是否在归还连接时验证
      test-on-return: false
      # 是否缓存PreparedStatement
      pool-prepared-statements: true
      # 每个连接最大PreparedStatement数
      max-pool-prepared-statement-per-connection-size: 20
      # 合并多个Druid DataSource的监控统计数据
      use-global-data-source-stat: false
      # 监控页面访问URL
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        # 监控页面登录用户名
        login-username: admin
        # 监控页面登录密码
        login-password: 123456
        # 是否允许重置监控数据
        reset-stat-enable: true
      # Web监控配置
      web-stat-filter:
        enabled: true
        url-pattern: /*
        # 排除静态资源
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

  data:
    # redis 配置
    redis:
      # 地址
      host: localhost
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 4
      # 密码
      password:
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 5
          # 连接池中的最大空闲连接
          max-idle: 20
          # 连接池的最大数据库连接数
          max-active: 20
          # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: 3000ms

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  # 生产环境改为false
  production: false

app:
  jwt:
    secret: secondHubsecondHubsecondHubsecondHub
    expire-seconds: 86400
    issuer: second-hub
  storage:
    type: local
    local-root: uploads
    local-prefix: /uploads/
    image-host: http://127.0.0.1:8080
  wechat:
    appid: wxaa51d047f8b7ef3c
    appsecret: 5df0f6c2df21d35508665cb8aa444cc8
